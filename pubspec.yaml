name: digital_hero_2048
description: 数字英雄传 - 2048 RPG 游戏
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  provider: ^6.1.1
  
  # 本地存储 (存档)
  shared_preferences: ^2.2.2
  
  # UI 组件
  cupertino_icons: ^1.0.6
  
  # 音频播放
  audioplayers: ^5.2.1
  
  # 粒子效果
  flutter_particle: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/audio/
    - assets/fonts/
